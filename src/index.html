<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brightness Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="window">
    <!-- Titlebar -->
    <div class="titlebar" data-tauri-drag-region>
      <img src="icon.png" class="titlebar-icon" alt="">
      <span class="titlebar-text" data-tauri-drag-region>Brightness Manager</span>
      <div class="lang-select-wrap">
        <span class="material-symbols-rounded lang-globe">language</span>
        <select class="lang-select" id="lang-select"></select>
      </div>
      <button class="titlebar-btn" id="btn-close">
        <span class="material-symbols-rounded">close</span>
      </button>
    </div>

    <!-- Content -->
    <div class="content">
      <!-- Top Row: Screens + Presets side by side -->
      <div class="row-2col">
        <!-- Screens -->
        <div class="card card-screens">
          <div class="card-header">
            <span class="material-symbols-rounded card-icon">monitor</span>
            <span class="card-title" id="lbl-screens">SCREENS</span>
          </div>
          <div class="screens-row" id="screens-row"></div>
        </div>

        <!-- Presets -->
        <div class="card card-presets">
          <div class="card-header">
            <span class="material-symbols-rounded card-icon">tune</span>
            <span class="card-title" id="lbl-presets">PRESETS</span>
          </div>
          <div class="presets-grid">
            <button class="preset-pill" data-preset="day">
              <span class="material-symbols-rounded">sunny</span>
              <span id="preset-day">Day</span>
            </button>
            <button class="preset-pill" data-preset="office">
              <span class="material-symbols-rounded">desktop_windows</span>
              <span id="preset-office">Office</span>
            </button>
            <button class="preset-pill" data-preset="night">
              <span class="material-symbols-rounded">dark_mode</span>
              <span id="preset-night">Night</span>
            </button>
            <button class="preset-pill" data-preset="reading">
              <span class="material-symbols-rounded">menu_book</span>
              <span id="preset-reading">Reading</span>
            </button>
            <button class="preset-pill" data-preset="movie">
              <span class="material-symbols-rounded">movie</span>
              <span id="preset-movie">Movie</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Sliders Card -->
      <div class="card">
        <div class="sliders-row">
          <div class="slider-col">
            <div class="slider-header">
              <span class="material-symbols-rounded slider-icon accent-warm">light_mode</span>
              <span class="slider-label" id="lbl-brightness">Brightness</span>
              <span class="slider-value accent-warm" id="val-brightness">100%</span>
            </div>
            <input type="range" class="custom-slider slider-brightness" id="slider-brightness" min="10" max="100" value="100">
          </div>
          <div class="slider-divider"></div>
          <div class="slider-col">
            <div class="slider-header">
              <span class="material-symbols-rounded slider-icon accent-cool">thermostat</span>
              <span class="slider-label" id="lbl-temperature">Color Temperature</span>
              <span class="slider-value accent-cool" id="val-temperature">6500K</span>
            </div>
            <input type="range" class="custom-slider slider-temperature" id="slider-temperature" min="1000" max="6500" step="100" value="6500">
          </div>
        </div>
      </div>

      <!-- Bottom Row: Toggles + Quit -->
      <div class="bottom-bar">
        <div class="toggle-chip" id="chip-startup">
          <span class="material-symbols-rounded">rocket_launch</span>
          <span id="lbl-startup">Start with Windows</span>
          <div class="switch" id="switch-startup">
            <div class="knob"></div>
          </div>
        </div>
        <div class="toggle-chip" id="chip-filter">
          <span class="material-symbols-rounded">filter_b_and_w</span>
          <span id="lbl-filter">Filter Active</span>
          <div class="switch on" id="switch-filter">
            <div class="knob"></div>
          </div>
        </div>
        <button class="btn-quit" id="btn-quit">
          <span class="material-symbols-rounded">power_settings_new</span>
          <span id="btn-quit-text">Quit</span>
        </button>
      </div>
    </div>
  </div>

  <script src="lang.js"></script>
  <script src="main.js"></script>
</body>
</html>
