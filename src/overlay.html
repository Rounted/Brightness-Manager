<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
    #overlay {
      width: 100vw;
      height: 100vh;
      background-color: rgba(0, 0, 0, 0);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="overlay"></div>
  <script>
    const { listen } = window.__TAURI__.event;
    const overlay = document.getElementById("overlay");

    listen("set-overlay-color", (event) => {
      const { r, g, b, a } = event.payload;
      overlay.style.backgroundColor = `rgba(${r}, ${g}, ${b}, ${a / 255})`;
    });
  </script>
</body>
</html>
